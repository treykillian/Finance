<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f7">
  <title>Balance - Personal Finance</title>
  <style>
    :root{color-scheme:light dark;--bg:#f5f5f7;--surface:#fff;--surface2:#f0f1f4;--text:#161617;--muted:#6e6e73;--line:#dddde2;--accent:#0a67d0;--green:#168348;--red:#c9342f;--shadow:0 4px 20px rgba(0,0,0,.06);--nav:rgba(250,250,252,.94)}
    @media(prefers-color-scheme:dark){:root{--bg:#0e0e10;--surface:#1c1c1e;--surface2:#29292c;--text:#f5f5f7;--muted:#a1a1a6;--line:#3a3a3d;--accent:#5aa8ff;--green:#54c985;--red:#ff6961;--shadow:0 4px 22px rgba(0,0,0,.28);--nav:rgba(24,24,26,.94)}}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif}body{padding-bottom:calc(88px + env(safe-area-inset-bottom))}button,input,select,textarea{font:inherit;color:inherit}button{cursor:pointer}.app{width:min(100%,760px);margin:auto;padding:18px 16px 40px}.topbar{display:flex;align-items:center;justify-content:space-between;margin:4px 0 20px}.brand{font-size:13px;font-weight:750;letter-spacing:.11em;text-transform:uppercase;color:var(--accent)}h1{font-size:30px;line-height:1.08;margin:3px 0 0;letter-spacing:-.025em}h2{font-size:19px;margin:0;letter-spacing:-.015em}.month{color:var(--muted);font-size:14px}.view{display:none}.view.active{display:block}.stack{display:grid;gap:12px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow)}.hero{padding:22px}.eyebrow,.label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}.hero-value{font-size:38px;font-weight:760;letter-spacing:-.045em;margin:8px 0 18px}.metric strong{display:block;font-size:21px;margin-top:6px;letter-spacing:-.025em}.positive{color:var(--green)}.negative{color:var(--red)}.section-head{display:flex;justify-content:space-between;align-items:end;margin:26px 2px 10px}.text-btn{border:0;background:none;color:var(--accent);font-weight:650;min-height:44px}.row{display:flex;gap:12px;align-items:center;padding:13px 0;border-bottom:1px solid var(--line)}.row:last-child{border-bottom:0}.row-main{min-width:0;flex:1}.row-title{font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.row-sub{font-size:13px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.amount{font-weight:700;text-align:right}.badge{display:inline-flex;align-items:center;min-height:24px;padding:3px 8px;border-radius:99px;background:var(--surface2);font-size:12px;font-weight:700}.empty{text-align:center;color:var(--muted);padding:28px 14px}.empty strong{display:block;color:var(--text);margin-bottom:5px}.filters{display:flex;gap:8px;overflow:auto;padding:1px 0 10px;scrollbar-width:none}.filters select,.search{border:1px solid var(--line);background:var(--surface);border-radius:12px;min-height:44px;padding:0 12px}.search{width:100%;margin-bottom:9px}.account-head{display:flex;align-items:start;justify-content:space-between;gap:12px}.account-balance{font-size:24px;font-weight:750;margin-top:8px}.summary-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.summary-strip .card{padding:13px 10px}.summary-strip strong{display:block;margin-top:5px;font-size:16px}.due-overdue{border-left:3px solid var(--red)}.chart{height:170px;display:flex;align-items:end;gap:10px;padding-top:20px}.bar-group{flex:1;display:flex;justify-content:center;align-items:end;gap:4px;height:130px;border-bottom:1px solid var(--line);position:relative}.bar{width:35%;min-height:2px;border-radius:5px 5px 0 0;background:var(--accent)}.bar.expense{background:var(--muted)}.bar-label{position:absolute;top:134px;font-size:10px;color:var(--muted)}.category-bar{height:9px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-top:7px}.category-bar span{display:block;height:100%;background:var(--accent);border-radius:inherit}.nav{position:fixed;z-index:20;left:0;right:0;bottom:0;height:calc(70px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:var(--nav);border-top:1px solid var(--line);backdrop-filter:blur(14px);display:flex;justify-content:center}.nav-inner{width:min(100%,760px);display:grid;grid-template-columns:repeat(5,1fr)}.nav button{border:0;background:none;color:var(--muted);min-height:64px;font-size:11px;font-weight:650;padding:8px 2px}.nav button span{display:block;font-size:19px;line-height:24px}.nav button.active{color:var(--accent)}.fab{position:fixed;z-index:30;right:max(18px,calc((100vw - 760px)/2 + 18px));bottom:calc(82px + env(safe-area-inset-bottom));width:56px;height:56px;border:0;border-radius:50%;background:var(--accent);color:white;font-size:30px;line-height:1;box-shadow:0 8px 26px rgba(10,103,208,.35)}.modal-wrap{position:fixed;z-index:100;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;padding-top:24px}.modal-wrap.open{display:flex}.modal{background:var(--surface);width:min(100%,620px);max-height:calc(100dvh - 24px);overflow:auto;border-radius:22px 22px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom))}.modal-head{display:flex;align-items:center;justify-content:space-between;position:sticky;top:-18px;background:var(--surface);z-index:2;padding:14px 0}.icon-btn{width:44px;height:44px;border-radius:50%;border:0;background:var(--surface2);font-size:20px}.form{display:grid;gap:14px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:grid;gap:6px}.field label{font-size:13px;font-weight:650}.field input,.field select,.field textarea{width:100%;min-height:48px;border:1px solid var(--line);background:var(--bg);border-radius:12px;padding:10px 12px}.field textarea{min-height:84px;resize:vertical}.full{grid-column:1/-1}.form-error{color:var(--red);font-size:13px;min-height:18px}.actions{display:flex;gap:10px;margin-top:4px}.btn{border:0;border-radius:12px;min-height:48px;padding:0 16px;font-weight:700;background:var(--accent);color:white;flex:1}.btn.secondary{background:var(--surface2);color:var(--text)}.btn.danger{background:var(--red)}.btn:disabled{opacity:.55;cursor:not-allowed}.toast{position:fixed;z-index:150;left:50%;bottom:calc(96px + env(safe-area-inset-bottom));transform:translate(-50%,20px);background:var(--text);color:var(--surface);padding:12px 16px;border-radius:12px;opacity:0;pointer-events:none;transition:.2s;white-space:nowrap}.toast.show{opacity:1;transform:translate(-50%,0)}button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:3px solid color-mix(in srgb,var(--accent) 45%,transparent);outline-offset:2px}@media(min-width:600px){.app{padding-top:30px}.modal-wrap{align-items:center;padding:24px}.modal{border-radius:22px;max-height:calc(100dvh - 48px)}.fab{bottom:92px}}@media(max-width:360px){.app{padding-inline:12px}.hero-value{font-size:33px}.grid{gap:9px}.card{padding:14px}.summary-strip{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.full{grid-column:auto}}@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar"><div><div class="brand">Balance</div><h1 id="pageTitle">Home</h1></div><div class="month" id="monthLabel"></div></header>
    <section id="home" class="view active" aria-labelledby="pageTitle"></section>
    <section id="transactions" class="view" aria-labelledby="pageTitle"></section>
    <section id="accounts" class="view" aria-labelledby="pageTitle"></section>
    <section id="upcoming" class="view" aria-labelledby="pageTitle"></section>
    <section id="insights" class="view" aria-labelledby="pageTitle"></section>
  </main>
  <button class="fab" aria-label="Add transaction" data-action="add-transaction">+</button>
  <nav class="nav" aria-label="Main navigation"><div class="nav-inner">
    <button class="active" data-view="home"><span>⌂</span>Home</button><button data-view="transactions"><span>↕</span>Transactions</button><button data-view="accounts"><span>▣</span>Accounts</button><button data-view="upcoming"><span>◷</span>Upcoming</button><button data-view="insights"><span>◫</span>Insights</button>
  </div></nav>
  <div class="modal-wrap" id="modalWrap" role="dialog" aria-modal="true" aria-labelledby="modalTitle"><div class="modal"><div class="modal-head"><h2 id="modalTitle"></h2><button class="icon-btn" data-action="close-modal" aria-label="Close">×</button></div><div id="modalBody"></div></div></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
(()=>{'use strict';
const KEY='balance_finance_v2', assetTypes=['checking','savings','cash','investment','other_asset'], debtTypes=['credit_card','loan','other_debt'];
const categories=['Paycheck','Freelance','Housing','Food','Transport','Utilities','Shopping','Health','Entertainment','Travel','Education','Other'];
const emptyState={version:2,accounts:[],transactions:[],transfers:[],upcoming:[],settings:{currency:'USD'},snapshots:[]};
let state=load(),currentView='home',editing=null,saving=false,txFilters={search:'',type:'all',category:'all',account:'all',month:'all'};
const $=(s,r=document)=>r.querySelector(s), $$=(s,r=document)=>[...r.querySelectorAll(s)], uid=()=>crypto.randomUUID?.()||Date.now().toString(36)+Math.random().toString(36).slice(2);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money=n=>new Intl.NumberFormat(undefined,{style:'currency',currency:state.settings.currency||'USD'}).format(Number(n)||0);
const dateFmt=d=>new Intl.DateTimeFormat(undefined,{month:'short',day:'numeric',year:'numeric'}).format(new Date(d+'T12:00:00'));
const today=()=>new Date().toISOString().slice(0,10), monthKey=d=>String(d).slice(0,7), title=s=>String(s).replaceAll('_',' ').replace(/\b\w/g,c=>c.toUpperCase());
function valid(raw){return raw&&Array.isArray(raw.accounts)&&Array.isArray(raw.transactions)&&Array.isArray(raw.transfers)&&Array.isArray(raw.upcoming)}
function migrate(raw){if(!raw||typeof raw!=='object')return structuredClone(emptyState);if(raw.version===2&&valid(raw))return {...structuredClone(emptyState),...raw,settings:{...emptyState.settings,...raw.settings}};let n=structuredClone(emptyState);n.accounts=Array.isArray(raw.accounts)?raw.accounts.map(a=>({id:a.id||uid(),name:a.name||'Account',type:a.type||'checking',balance:Number(a.balance)||0,institution:a.institution||''})):[];n.transactions=Array.isArray(raw.transactions)?raw.transactions.map(t=>({...t,id:t.id||uid(),amount:Math.abs(Number(t.amount)||0),type:t.type==='income'?'income':'expense'})):[];n.upcoming=Array.isArray(raw.upcoming)?raw.upcoming:[];return n}
function migrateLedgerly(raw){let n=structuredClone(emptyState),typeOf=a=>{let s=`${a.accountType||a.type||''} ${a.status||''}`.toLowerCase();if(/credit/.test(s))return'credit_card';if(/loan|liabil|debt/.test(s))return'loan';if(/saving/.test(s))return'savings';if(/cash/.test(s))return'cash';if(/invest|broker|crypto|hsa/.test(s))return'investment';if(/checking/.test(s))return'checking';return /liabil|debt/.test(s)?'other_debt':'other_asset'};n.accounts=(Array.isArray(raw.accounts)?raw.accounts:[]).map(a=>({id:a.id||uid(),name:a.name||'Account',type:typeOf(a),balance:Math.abs(Number(a.balance??a.openingBalance)||0),institution:a.institution||''}));let source=Array.isArray(raw.ledger)&&raw.ledger.length?raw.ledger:(Array.isArray(raw.transactions)?raw.transactions:[]);n.transactions=source.filter(t=>t.type!=='transfer').map(t=>({id:t.id||uid(),type:t.type==='income'?'income':'expense',amount:Math.abs(Number(t.amount??(Number(t.amountCents)||0)/100)||0),category:t.category||t.categoryId||t.name||'Other',accountId:t.accountId||'',date:String(t.date||t.createdAt||today()).slice(0,10),note:t.notes||t.note||t.description||t.name||''})).filter(t=>t.amount>0);n.upcoming=(Array.isArray(raw.plannedExpenses)?raw.plannedExpenses:[]).map(x=>({id:x.id||uid(),name:x.name||'Planned expense',amount:Math.abs(Number(x.amount??(Number(x.amountCents)||0)/100)||0),dueDate:String(x.dueDate||x.date||today()).slice(0,10),category:x.category||x.categoryId||'Other',accountId:x.accountId||'',recurring:x.frequency&&x.frequency!=='one-time',frequency:x.frequency==='biweekly'?'biweekly':x.frequency||'monthly',paid:Boolean(x.paid||x.status==='paid'),note:x.notes||x.note||'',transactionId:x.transactionId||null}));n.settings.currency=raw.settings?.currency||'USD';return n}
function load(){try{let r=localStorage.getItem(KEY);if(r)return migrate(JSON.parse(r));let keys=[];for(let i=0;i<localStorage.length;i++)keys.push(localStorage.key(i));let legacy=keys.filter(k=>/^financeAppData_v|^ledgerly\./.test(k||'')).sort().reverse()[0];if(legacy){let parsed=JSON.parse(localStorage.getItem(legacy));let converted=migrateLedgerly(parsed);localStorage.setItem(KEY,JSON.stringify(converted));return converted}return structuredClone(emptyState)}catch(e){return structuredClone(emptyState)}}
function save(){state.snapshots=state.snapshots||[];localStorage.setItem(KEY,JSON.stringify(state))}
const isDebt=a=>debtTypes.includes(a.type), totals=()=>{let assets=0,debts=0;state.accounts.forEach(a=>isDebt(a)?debts+=a.balance:assets+=a.balance);return{assets,debts,net:assets-debts}};
function monthly(offset=0){let d=new Date();d.setMonth(d.getMonth()+offset);let key=d.toISOString().slice(0,7),income=0,expenses=0;state.transactions.filter(t=>monthKey(t.date)===key).forEach(t=>t.type==='income'?income+=t.amount:expenses+=t.amount);return{key,income,expenses,saved:income-expenses}}
function account(id){return state.accounts.find(a=>a.id===id)}
function applyTx(t,dir=1){let a=account(t.accountId);if(!a)return;let delta=(t.type==='income'?t.amount:-t.amount)*dir;if(isDebt(a))delta=-delta;a.balance=+(a.balance+delta).toFixed(2)}
function rowTx(t){let a=account(t.accountId);return `<div class="row"><div class="row-main"><div class="row-title">${esc(t.category)}${t.note?` · ${esc(t.note)}`:''}</div><div class="row-sub">${esc(a?.name||'Deleted account')} · ${dateFmt(t.date)}</div></div><div><div class="amount ${t.type==='income'?'positive':'negative'}">${t.type==='income'?'+':'−'}${money(t.amount)}</div><button class="text-btn" data-action="edit-transaction" data-id="${t.id}">Edit</button></div></div>`}
function empty(label,copy){return `<div class="empty"><strong>${label}</strong>${copy}</div>`}
function renderHome(){let t=totals(),m=monthly(),up=state.upcoming.filter(x=>!x.paid).sort((a,b)=>a.dueDate.localeCompare(b.dueDate)).slice(0,3),recent=[...state.transactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,4);$('#home').innerHTML=`<div class="card hero"><div class="eyebrow">Current net worth</div><div class="hero-value">${money(t.net)}</div><div class="grid"><div class="metric"><span class="label">Assets</span><strong>${money(t.assets)}</strong></div><div class="metric"><span class="label">Debts</span><strong>${money(t.debts)}</strong></div></div></div><div class="section-head"><h2>This month</h2></div><div class="grid"><div class="card metric"><span class="label">Income</span><strong class="positive">${money(m.income)}</strong></div><div class="card metric"><span class="label">Expenses</span><strong>${money(m.expenses)}</strong></div><div class="card metric full"><span class="label">Remaining</span><strong class="${m.saved<0?'negative':'positive'}">${money(m.saved)}</strong></div></div><div class="section-head"><h2>Coming up</h2><button class="text-btn" data-view="upcoming">See all</button></div><div class="card">${up.length?up.map(x=>`<div class="row"><div class="row-main"><div class="row-title">${esc(x.name)}</div><div class="row-sub">Due ${dateFmt(x.dueDate)}</div></div><div class="amount">${money(x.amount)}</div></div>`).join(''):empty('Nothing due','Planned expenses will appear here.')}</div><div class="section-head"><h2>Recent activity</h2><button class="text-btn" data-view="transactions">See all</button></div><div class="card">${recent.length?recent.map(rowTx).join(''):empty('No transactions yet','Tap + to record income or an expense.')}</div>`}
function filterTransactions(){return [...state.transactions].filter(t=>(!txFilters.search||`${t.category} ${t.note||''}`.toLowerCase().includes(txFilters.search.toLowerCase()))&&(txFilters.type==='all'||t.type===txFilters.type)&&(txFilters.category==='all'||t.category===txFilters.category)&&(txFilters.account==='all'||t.accountId===txFilters.account)&&(txFilters.month==='all'||monthKey(t.date)===txFilters.month)).sort((a,b)=>b.date.localeCompare(a.date))}
function opts(items,valFn=x=>x,labelFn=x=>x){return items.map(x=>`<option value="${esc(valFn(x))}">${esc(labelFn(x))}</option>`).join('')}
function renderTransactions(){let months=[...new Set(state.transactions.map(t=>monthKey(t.date)))].sort().reverse(),list=filterTransactions();$('#transactions').innerHTML=`<input class="search" id="txSearch" type="search" placeholder="Search transactions" value="${esc(txFilters.search)}" aria-label="Search transactions"><div class="filters"><select data-filter="type" aria-label="Filter by type"><option value="all">All types</option><option value="income">Income</option><option value="expense">Expenses</option></select><select data-filter="category" aria-label="Filter by category"><option value="all">All categories</option>${opts(categories)}</select><select data-filter="account" aria-label="Filter by account"><option value="all">All accounts</option>${opts(state.accounts,a=>a.id,a=>a.name)}</select><select data-filter="month" aria-label="Filter by month"><option value="all">All months</option>${opts(months)}</select></div><div class="card">${list.length?list.map(rowTx).join(''):empty('No matching transactions','Try another filter or add a transaction.')}</div>`;$$('[data-filter]').forEach(s=>s.value=txFilters[s.dataset.filter])}
function renderAccounts(){let t=totals(),assets=state.accounts.filter(a=>!isDebt(a)),debts=state.accounts.filter(isDebt);let cards=list=>list.map(a=>`<div class="card"><div class="account-head"><div><div class="row-title">${esc(a.name)}</div><div class="row-sub">${title(a.type)}${a.institution?' · '+esc(a.institution):''}</div></div><button class="text-btn" data-action="edit-account" data-id="${a.id}">Edit</button></div><div class="account-balance">${money(a.balance)}</div><button class="text-btn" data-action="account-transactions" data-id="${a.id}">View transactions</button></div>`).join('');$('#accounts').innerHTML=`<div class="summary-strip"><div class="card"><span class="label">Assets</span><strong>${money(t.assets)}</strong></div><div class="card"><span class="label">Debts</span><strong>${money(t.debts)}</strong></div><div class="card"><span class="label">Net worth</span><strong>${money(t.net)}</strong></div></div><div class="section-head"><h2>Assets</h2><button class="text-btn" data-action="add-account">Add</button></div><div class="stack">${assets.length?cards(assets):empty('No asset accounts','Add checking, savings, cash, or investments.')}</div><div class="section-head"><h2>Debts</h2><button class="text-btn" data-action="add-account">Add</button></div><div class="stack">${debts.length?cards(debts):empty('No debt accounts','Credit cards and loans appear here.')}</div>${state.accounts.length>1?`<div class="section-head"><h2>Move money</h2></div><button class="btn secondary" data-action="add-transfer">Transfer between accounts</button>`:''}`}
function renderUpcoming(){let now=today(),in7=new Date();in7.setDate(in7.getDate()+7);let in30=new Date();in30.setDate(in30.getDate()+30);let active=state.upcoming.filter(x=>!x.paid),amount30=active.filter(x=>x.dueDate<=in30.toISOString().slice(0,10)).reduce((s,x)=>s+x.amount,0),sort=[...state.upcoming].sort((a,b)=>(a.paid-b.paid)||a.dueDate.localeCompare(b.dueDate));$('#upcoming').innerHTML=`<div class="summary-strip"><div class="card"><span class="label">Overdue</span><strong>${active.filter(x=>x.dueDate<now).length}</strong></div><div class="card"><span class="label">Next 7 days</span><strong>${active.filter(x=>x.dueDate>=now&&x.dueDate<=in7.toISOString().slice(0,10)).length}</strong></div><div class="card"><span class="label">Next 30 days</span><strong>${money(amount30)}</strong></div></div><div class="section-head"><h2>Planned expenses</h2><button class="text-btn" data-action="add-upcoming">Add</button></div><div class="stack">${sort.length?sort.map(x=>`<div class="card ${!x.paid&&x.dueDate<now?'due-overdue':''}"><div class="account-head"><div><div class="row-title">${esc(x.name)}</div><div class="row-sub">${x.paid?'Paid':'Due '+dateFmt(x.dueDate)} · ${esc(x.category)}${x.recurring?' · '+title(x.frequency):''}</div></div><div class="amount">${money(x.amount)}</div></div><div class="actions">${!x.paid?`<button class="btn" data-action="pay-upcoming" data-id="${x.id}">Mark paid</button>`:''}<button class="btn secondary" data-action="edit-upcoming" data-id="${x.id}">Edit</button></div></div>`).join(''):empty('Nothing planned','Add bills and upcoming expenses to stay ahead.')}</div>`}
function renderInsights(){let m=monthly(),rate=m.income?m.saved/m.income*100:null,months=Array.from({length:6},(_,i)=>monthly(i-5)),max=Math.max(1,...months.flatMap(x=>[x.income,x.expenses])),cats={};state.transactions.filter(t=>t.type==='expense'&&monthKey(t.date)===m.key).forEach(t=>cats[t.category]=(cats[t.category]||0)+t.amount);let catMax=Math.max(1,...Object.values(cats));$('#insights').innerHTML=`<div class="grid"><div class="card metric"><span class="label">Income</span><strong>${money(m.income)}</strong></div><div class="card metric"><span class="label">Spending</span><strong>${money(m.expenses)}</strong></div><div class="card metric"><span class="label">Saved</span><strong>${money(m.saved)}</strong></div><div class="card metric"><span class="label">Savings rate</span><strong>${rate===null?'Unavailable':rate.toFixed(1)+'%'}</strong></div></div><div class="section-head"><h2>Income vs spending</h2></div><div class="card">${state.transactions.length?`<div class="chart" role="img" aria-label="Six month income and spending chart">${months.map(x=>`<div class="bar-group"><i class="bar" style="height:${x.income/max*100}%"></i><i class="bar expense" style="height:${x.expenses/max*100}%"></i><span class="bar-label">${x.key.slice(5)}</span></div>`).join('')}</div><p class="row-sub">Blue bars show income; gray bars show spending. This month: ${money(m.income)} income and ${money(m.expenses)} spending.</p>`:empty('Not enough data','Add transactions to see monthly comparisons.')}</div><div class="section-head"><h2>Spending by category</h2></div><div class="card">${Object.keys(cats).length?Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="row-main" style="margin-bottom:14px"><div class="account-head"><span>${esc(k)}</span><strong>${money(v)}</strong></div><div class="category-bar"><span style="width:${v/catMax*100}%"></span></div></div>`).join(''):empty('No spending this month','Expense categories will appear here.')}</div><div class="section-head"><h2>Net-worth trend</h2></div><div class="card">${empty('Building your history','Net-worth history will grow as you use the app.')}</div>`}
function render(){document.title=`${title(currentView)} · Balance`;$('#pageTitle').textContent=title(currentView);$('#monthLabel').textContent=new Intl.DateTimeFormat(undefined,{month:'long',year:'numeric'}).format(new Date());renderHome();renderTransactions();renderAccounts();renderUpcoming();renderInsights();$$('.view').forEach(v=>v.classList.toggle('active',v.id===currentView));$$('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===currentView))}
function showToast(msg){let t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('show'),2200)}
function openModal(name,html){$('#modalTitle').textContent=name;$('#modalBody').innerHTML=html;$('#modalWrap').classList.add('open');setTimeout(()=>$('#modalBody input, #modalBody select')?.focus(),50)}
function closeModal(){if(!saving)$('#modalWrap').classList.remove('open')}
function field(label,name,control,full=''){return `<div class="field ${full}"><label for="${name}">${label}</label>${control}</div>`}
function transactionForm(t={type:'expense',amount:'',category:'',accountId:'',date:today(),note:''}){openModal(t.id?'Edit transaction':'New transaction',`<form class="form" id="transactionForm"><div class="form-grid">${field('Type','type',`<select id="type" name="type"><option value="expense">Expense</option><option value="income">Income</option></select>`)}${field('Amount','amount',`<input id="amount" name="amount" inputmode="decimal" type="number" min="0.01" step="0.01" value="${esc(t.amount)}" required>`)}${field('Category','category',`<select id="category" name="category" required><option value="">Choose category</option>${opts(categories)}</select>`)}${field('Account','accountId',`<select id="accountId" name="accountId" required><option value="">Choose account</option>${opts(state.accounts,a=>a.id,a=>a.name)}</select>`)}${field('Date','date',`<input id="date" name="date" type="date" value="${esc(t.date)}" required>`)}${field('Note (optional)','note',`<input id="note" name="note" maxlength="120" value="${esc(t.note||'')}">`,'full')}</div><div class="form-error" id="formError"></div><div class="actions">${t.id?`<button type="button" class="btn danger" data-action="delete-transaction" data-id="${t.id}">Delete</button>`:''}<button class="btn" type="submit">Save transaction</button></div></form>`);$('#type').value=t.type;$('#category').value=t.category;$('#accountId').value=t.accountId;editing=t.id||null}
function accountForm(a={name:'',type:'checking',balance:'',institution:''}){openModal(a.id?'Edit account':'New account',`<form class="form" id="accountForm">${field('Account name','name',`<input id="name" name="name" value="${esc(a.name)}" required>`)}${field('Account type','accountType',`<select id="accountType" name="type">${opts([...assetTypes,...debtTypes],x=>x,title)}</select>`)}${field('Current balance','balance',`<input id="balance" name="balance" inputmode="decimal" type="number" min="0" step="0.01" value="${esc(a.balance)}" required>`)}${field('Institution (optional)','institution',`<input id="institution" name="institution" value="${esc(a.institution||'')}">`)}<div class="form-error" id="formError"></div><div class="actions">${a.id?`<button type="button" class="btn danger" data-action="delete-account" data-id="${a.id}">Delete</button>`:''}<button class="btn" type="submit">Save account</button></div></form>`);$('#accountType').value=a.type;editing=a.id||null}
function upcomingForm(x={name:'',amount:'',dueDate:today(),category:'',accountId:'',recurring:false,frequency:'monthly',note:''}){openModal(x.id?'Edit upcoming expense':'New upcoming expense',`<form class="form" id="upcomingForm"><div class="form-grid">${field('Name','name',`<input id="name" name="name" value="${esc(x.name)}" required>`)}${field('Amount','amount',`<input id="amount" name="amount" inputmode="decimal" type="number" min="0.01" step="0.01" value="${esc(x.amount)}" required>`)}${field('Due date','dueDate',`<input id="dueDate" name="dueDate" type="date" value="${esc(x.dueDate)}" required>`)}${field('Category','category',`<select id="category" name="category"><option value="">Choose category</option>${opts(categories)}</select>`)}${field('Paying account','accountId',`<select id="accountId" name="accountId"><option value="">Choose account</option>${opts(state.accounts,a=>a.id,a=>a.name)}</select>`)}${field('Schedule','recurring',`<select id="recurring" name="recurring"><option value="false">One time</option><option value="true">Recurring</option></select>`)}${field('Frequency','frequency',`<select id="frequency" name="frequency"><option value="weekly">Weekly</option><option value="biweekly">Every two weeks</option><option value="monthly">Monthly</option><option value="yearly">Yearly</option></select>`)}${field('Note (optional)','note',`<input id="note" name="note" value="${esc(x.note||'')}">`,'full')}</div><div class="form-error" id="formError"></div><div class="actions">${x.id?`<button type="button" class="btn danger" data-action="delete-upcoming" data-id="${x.id}">Delete</button>`:''}<button class="btn" type="submit">Save expense</button></div></form>`);$('#category').value=x.category;$('#accountId').value=x.accountId;$('#recurring').value=String(x.recurring);$('#frequency').value=x.frequency;editing=x.id||null}
function transferForm(){openModal('Transfer money',`<form class="form" id="transferForm">${field('From account','fromId',`<select id="fromId" name="fromId"><option value="">Choose account</option>${opts(state.accounts,a=>a.id,a=>a.name)}</select>`)}${field('To account','toId',`<select id="toId" name="toId"><option value="">Choose account</option>${opts(state.accounts,a=>a.id,a=>a.name)}</select>`)}${field('Amount','amount',`<input id="amount" name="amount" type="number" inputmode="decimal" min="0.01" step="0.01" required>`)}${field('Date','date',`<input id="date" name="date" type="date" value="${today()}" required>`)}<div class="form-error" id="formError"></div><button class="btn" type="submit">Transfer</button></form>`)}
function confirmBox(titleText,copy,yes){openModal(titleText,`<p>${esc(copy)}</p><div class="actions"><button class="btn secondary" data-action="close-modal">Cancel</button><button class="btn danger" id="confirmYes">Confirm</button></div>`);$('#confirmYes').onclick=()=>{yes();closeModal()}}
function recurrence(date,f){let d=new Date(date+'T12:00:00');if(f==='weekly')d.setDate(d.getDate()+7);if(f==='biweekly')d.setDate(d.getDate()+14);if(f==='monthly')d.setMonth(d.getMonth()+1);if(f==='yearly')d.setFullYear(d.getFullYear()+1);return d.toISOString().slice(0,10)}
document.addEventListener('click',e=>{let b=e.target.closest('button');if(!b)return;if(b.dataset.view){currentView=b.dataset.view;render();scrollTo(0,0);return}let a=b.dataset.action,id=b.dataset.id;if(a==='close-modal')closeModal();if(a==='add-transaction'){if(!state.accounts.length){showToast('Add an account first');currentView='accounts';render()}else transactionForm()}if(a==='edit-transaction')transactionForm(state.transactions.find(x=>x.id===id));if(a==='add-account')accountForm();if(a==='edit-account')accountForm(account(id));if(a==='add-upcoming'){if(!state.accounts.length)showToast('Add an account first');else upcomingForm()}if(a==='edit-upcoming')upcomingForm(state.upcoming.find(x=>x.id===id));if(a==='add-transfer')transferForm();if(a==='account-transactions'){txFilters.account=id;currentView='transactions';render()}if(a==='delete-transaction')confirmBox('Delete transaction?','This will reverse its account balance change.',()=>{let t=state.transactions.find(x=>x.id===id);applyTx(t,-1);state.transactions=state.transactions.filter(x=>x.id!==id);save();render();showToast('Transaction deleted')});if(a==='delete-account'){let related=state.transactions.filter(x=>x.accountId===id);confirmBox('Delete account?',related.length?`This account has ${related.length} connected transaction(s). Confirming will delete those records too.`:'This account will be permanently deleted.',()=>{related.forEach(t=>state.transactions=state.transactions.filter(x=>x.id!==t.id));state.accounts=state.accounts.filter(x=>x.id!==id);save();render();showToast('Account deleted')})}if(a==='delete-upcoming')confirmBox('Delete planned expense?','This cannot be undone.',()=>{state.upcoming=state.upcoming.filter(x=>x.id!==id);save();render();showToast('Upcoming expense deleted')});if(a==='pay-upcoming'){let x=state.upcoming.find(x=>x.id===id);confirmBox('Create expense transaction?',`Mark ${x.name} paid and deduct ${money(x.amount)} from ${account(x.accountId)?.name||'the account'}?`,()=>{if(x.paid||x.transactionId)return;let t={id:uid(),type:'expense',amount:x.amount,category:x.category,accountId:x.accountId,date:today(),note:x.note||x.name,sourceUpcomingId:x.id};state.transactions.push(t);applyTx(t);x.paid=true;x.transactionId=t.id;if(x.recurring)state.upcoming.push({...x,id:uid(),dueDate:recurrence(x.dueDate,x.frequency),paid:false,transactionId:null});save();render();showToast('Expense marked paid')})}});
document.addEventListener('input',e=>{if(e.target.id==='txSearch'){txFilters.search=e.target.value;renderTransactions()}});document.addEventListener('change',e=>{if(e.target.dataset.filter){txFilters[e.target.dataset.filter]=e.target.value;renderTransactions()}});
document.addEventListener('submit',e=>{e.preventDefault();if(saving)return;saving=true;let f=e.target,fd=Object.fromEntries(new FormData(f)),err=$('#formError'),button=$('button[type=submit]',f);button.disabled=true;let fail=m=>{err.textContent=m;button.disabled=false;saving=false};try{if(f.id==='transactionForm'){let amount=Number(fd.amount);if(!(amount>0)||!fd.accountId||!fd.category)return fail('Enter a valid amount, account, and category.');let old=editing&&state.transactions.find(x=>x.id===editing);if(old)applyTx(old,-1);let t={id:old?.id||uid(),type:fd.type,amount,category:fd.category,accountId:fd.accountId,date:fd.date,note:fd.note.trim()};if(old)Object.assign(old,t);else state.transactions.push(t);applyTx(t);save();showToast(old?'Transaction updated':'Transaction saved')}else if(f.id==='accountForm'){let balance=Number(fd.balance);if(!fd.name.trim()||balance<0||!Number.isFinite(balance))return fail('Enter a name and a valid non-negative balance.');let old=editing&&account(editing),a={id:old?.id||uid(),name:fd.name.trim(),type:fd.type,balance,institution:fd.institution.trim()};if(old)Object.assign(old,a);else state.accounts.push(a);save();showToast(old?'Account updated':'Account added')}else if(f.id==='upcomingForm'){let amount=Number(fd.amount);if(!fd.name.trim()||!(amount>0)||!fd.accountId||!fd.category)return fail('Enter a name, valid amount, category, and account.');let old=editing&&state.upcoming.find(x=>x.id===editing),x={id:old?.id||uid(),name:fd.name.trim(),amount,dueDate:fd.dueDate,category:fd.category,accountId:fd.accountId,recurring:fd.recurring==='true',frequency:fd.frequency,note:fd.note.trim(),paid:old?.paid||false,transactionId:old?.transactionId||null};if(old)Object.assign(old,x);else state.upcoming.push(x);save();showToast(old?'Upcoming expense updated':'Upcoming expense added')}else if(f.id==='transferForm'){let amount=Number(fd.amount),from=account(fd.fromId),to=account(fd.toId);if(!from||!to||from===to||!(amount>0))return fail('Choose two different accounts and a valid amount.');from.balance=+(from.balance+(isDebt(from)?amount:-amount)).toFixed(2);to.balance=+(to.balance+(isDebt(to)?-amount:amount)).toFixed(2);state.transfers.push({id:uid(),fromId:from.id,toId:to.id,amount,date:fd.date});save();showToast('Transfer complete')}closeModal();render()}catch(x){fail('Could not save. Your data was preserved.')}finally{if(saving){saving=false;button.disabled=false}}});
$('#modalWrap').addEventListener('click',e=>{if(e.target===$('#modalWrap'))closeModal()});document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});render();
})();
</script>
</body></html>
